<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="alternate icon" type="image/x-icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <meta name="theme-color" content="#020617" />

    <!-- PWA / iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="TRACKVOLT" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- SEO / ASO -->
    <title>TRACKVOLT - CrossFit & Hybrid Athlete Tracker</title>
    <meta name="description" content="Built for CrossFit, HYROX, and hybrid athletes. Log WODs, track macros and recovery, and save every PR." />
    <meta name="keywords" content="crossfit tracker, wod tracker, crossfit app, workout tracker, PR tracker, hybrid athlete, hyrox training, crossfit nutrition, macro tracker, fitness app, crossfit wod, amrap timer, emom timer, cycle training, menstrual cycle fitness, offline workout app" />
    <meta name="author" content="TRACKVOLT" />
    <link rel="canonical" href="https://trackvolt.app/" />

    <!-- Open Graph (Facebook, LinkedIn, iMessage, Slack) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://trackvolt.app/" />
    <meta property="og:title" content="TRACKVOLT - Every Rep. Every Round. Every PR." />
    <meta property="og:description" content="Built for CrossFit, HYROX, and hybrid athletes. Log WODs, track macros and recovery, and save every PR. Works offline. Always." />
    <meta property="og:image" content="https://trackvolt.app/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="TRACKVOLT" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="TRACKVOLT - CrossFit & Hybrid Athlete Tracker" />
    <meta name="twitter:description" content="Built for CrossFit, HYROX, and hybrid athletes. Log WODs, track macros and recovery, and save every PR." />
    <meta name="twitter:image" content="https://trackvolt.app/og-image.png" />

    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "TRACKVOLT",
      "alternateName": "TrackVolt",
      "description": "Built for CrossFit, HYROX, and hybrid athletes. Log WODs, track macros and recovery, and save every PR. Works offline. Always.",
      "url": "https://trackvolt.app/",
      "applicationCategory": "HealthApplication",
      "operatingSystem": "Any",
      "browserRequirements": "Requires a modern browser with JavaScript",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "featureList": [
        "CrossFit WOD Logging",
        "Personal Record Tracking",
        "Macro & Nutrition Tracking",
        "Menstrual Cycle Training Sync",
        "HYROX Training Support",
        "Offline-First PWA",
        "AMRAP / EMOM / For Time Timers",
        "1RM Calculator",
        "Recovery Score",
        "Achievement System"
      ],
      "screenshot": [
        {
          "@type": "ImageObject",
          "url": "https://trackvolt.app/screenshots/today-dashboard.png",
          "caption": "Daily dashboard with streak, recovery, workout, and nutrition at a glance"
        },
        {
          "@type": "ImageObject",
          "url": "https://trackvolt.app/screenshots/workout-log.png",
          "caption": "Log any WOD in seconds - AMRAP, EMOM, For Time, Strength"
        },
        {
          "@type": "ImageObject",
          "url": "https://trackvolt.app/screenshots/nutrition-macros.png",
          "caption": "Track macros with visual progress bars and meal logging"
        },
        {
          "@type": "ImageObject",
          "url": "https://trackvolt.app/screenshots/progress-prs.png",
          "caption": "Watch your PRs grow with charts and personal records"
        }
      ],
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "4.9",
        "ratingCount": "1",
        "bestRating": "5"
      }
    }
    </script>

    <!-- CSP -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; connect-src 'self' https://generativelanguage.googleapis.com https://world.openfoodfacts.org https://*.firebaseio.com https://*.googleapis.com https://*.firebaseapp.com; font-src 'self'; worker-src 'self'; manifest-src 'self'" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
